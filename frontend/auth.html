<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ResumeAI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%233b82f6'/><text x='16' y='22' text-anchor='middle' font-family='Arial,sans-serif' font-size='18' font-weight='bold' fill='white'>R</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    (function() {
      const theme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="navbar-brand">
        
        ResumeChecker
      </a>
      <ul class="navbar-links">
        <li><a href="how_it_works.html">How It Works</a></li>
      </ul>
      <div class="navbar-actions">
        <button class="btn btn-icon btn-secondary" id="themeToggle" title="Toggle Theme" style="margin-right: 4px;">
          <i data-lucide="moon"></i>
        </button>
        <a href="index.html" class="btn btn-secondary btn-sm">← Home</a>
      </div>
    </div>
  </nav>

  <section class="auth-page">
    <div class="auth-card fade-in">
      <div class="auth-logo">
        
        ResumeChecker
      </div>

      <div class="auth-header">
        <h2>Welcome back</h2>
        <p>Continue optimizing your resume</p>
      </div>

      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="loginForm">
        <div class="form-group">
          <label for="login-email">Email address</label>
          <input type="text" id="login-email" class="form-input" placeholder="Email address (e.g. rafay@test.com)" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Log In</button>
      </form>

      <!-- Signup Form -->
      <form class="auth-form hidden" id="signupForm">
        <div class="form-group">
          <label for="signup-name">Full name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email address</label>
          <input type="text" id="signup-email" class="form-input" placeholder="Email address (e.g. rafay@test.com)" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="8+ chars, 1 uppercase, 1 number" required>
        </div>
        <div class="form-group">
          <label for="signup-role">Current role / target title</label>
          <input type="text" id="signup-role" class="form-input" placeholder="e.g. Software Engineer" required>
        </div>
        <div class="form-group">
          <label for="signup-experience">Years of experience</label>
          <input type="number" id="signup-experience" class="form-input" placeholder="e.g. 3" min="0" required>
        </div>
        <div class="form-group">
          <label for="signup-linkedin">LinkedIn profile URL</label>
          <input type="url" id="signup-linkedin" class="form-input" placeholder="https://linkedin.com/in/username" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
      </form>
    </div>
  </section>

  <script src="js/main.js"></script>
<script>
    lucide.createIcons();
  </script>
</body>
</html>
